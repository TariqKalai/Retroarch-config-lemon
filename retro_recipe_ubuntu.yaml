{{- $image := or .image "retroarch-ubuntu-lemon.img" -}}

architecture: armhf

actions:
  - action: debootstrap
    suite: "noble"
    components:
      - main
      - universe
    mirror: http://ports.ubuntu.com/ubuntu-ports
    variant: minbase
    keyring-file: /usr/share/keyrings/ubuntu-archive-keyring.gpg

  - action: run
    description: Enable non-free-firmware Ubuntu repo
    chroot: true
    command: sed -i 's/main$/main non-free-firmware/g' /etc/apt/sources.list

  - action: apt
    packages: [ca-certificates, coreutils, sudo, openssh-server, adduser, systemd, systemd-sysv, systemd-resolved, nano, vim, qrtr-tools, libqmi-utils, rmtfs, udev, kmod, network-manager, modemmanager, wpasupplicant, ifupdown, isc-dhcp-client, isc-dhcp-server, systemd-timesyncd, bluetooth, kpartx, cloud-utils, fake-hwclock, wireless-regdb, usbutils, iputils-ping]

  - action: run
    description: Add citronics APT repository
    chroot: true
    command: echo "deb [trusted=yes] https://raw.githubusercontent.com/Citronics/deb-packages/main stable main" | tee /etc/apt/sources.list.d/citronics.list

  - action: apt
    packages: 

      - initramfs-tools
      - citronics-initramfs
      - linux-firmware-lemon
      - software-properties-common
      - linux-headers-6.12.0-citronics-lemon
      - linux-image-6.12.0-citronics-lemon
      - retroarch
      - console-setup
      - mesa-utils
      - xserver-xorg-legacy
      - xinit 
      - openbox
      - x11-xserver-utils
      - xserver-xorg
      


  - action: run
    chroot: true
    script: scripts/setup-user.sh

  - action: run
    chroot: true
    command: echo citronics > /etc/hostname

  - action: overlay
    source: overlays
    destination: /

  - action: run
    chroot: true
    script: scripts/setup-networking.sh

  - action: run
    chroot: true
    command: update-initramfs -c -k 6.12.0-citronics-lemon

  - action: run
    chroot: true
    command: |
      # 1. Créer le dossier de config
      mkdir -p /home/citro/.config/retroarch/cores
      mkdir -p /home/citro/.config/retroarch/info

      # 2. Création du retroarch.cfg avec certain parametres specifique. 
      cat <<EOF > /home/citro/.config/retroarch/retroarch.cfg
      video_driver = "gl"
      video_context_driver = "x"
      menu_driver = "xmb"
      video_fullscreen = "true"  
      libretro_directory = "/home/citro/.config/retroarch/cores"
      libretro_info_path = "/home/citro/.config/retroarch/info"
      assets_directory = "/usr/share/libretro/assets"
      EOF

      # 3. Donner les droits à citro
      chown -R citro:citro /home/citro/.config/


      # setup du startx de x.org
      cat <<EOF > /home/citro/.xinitrc
      export XDG_RUNTIME_DIR=/run/user/\$(id -u)
      xinput set-prop "ILI210x Touchscreen" "Coordinate Transformation Matrix" 0 1 0 -1 0 1 0 0 1 &
      xrandr --output DSI-1 --rotate right &
      openbox-session &
      sleep 1
      exec retroarch
      EOF

      cat <<EOF > /etc/X11/Xwrapper.config
      allowed_users=anybody
      needs_root_rights=yes
      EOF



      echo 'SUBSYSTEM=="drm", KERNEL=="card0", GROUP="video", MODE="0660"' > /etc/udev/rules.d/99-freedreno.rules

      chown -R citro:citro /home/citro/

      usermod -a -G video,render,audio,input,tty citro

  
  - action: run
    chroot: true
    command: |

      cd /tmp
      wget https://git.kernel.org/pub/scm/linux/kernel/git/firmware/linux-firmware.git/plain/qcom/a330_pm4.fw
      wget https://git.kernel.org/pub/scm/linux/kernel/git/firmware/linux-firmware.git/plain/qcom/a330_pfp.fw
      chmod 644 /tmp/a330*
      mkdir -p /lib/firmware/qcom
      mv /tmp/a330* /lib/firmware/qcom


      add-apt-repository -y ppa:zhangsongcui3371/fastfetch

      apt-get update
      apt-get install -y fastfetch


  - action: run
    description: Configuration du clavier en Français
    chroot: true
    command: |
      # Configure la disposition du clavier pour la console (TTY)
      cat <<EOF > /etc/default/keyboard
      XKBMODEL="pc105"
      XKBLAYOUT="fr"
      XKBVARIANT=""
      XKBOPTIONS=""
      BACKSPACE="guess"
      EOF

      # Applique la configuration pour que ce soit généré au boot
      DEBIAN_FRONTEND=noninteractive dpkg-reconfigure console-setup


  

  - action: image-partition
    imagename: {{ $image }}
    imagesize: 2GB
    partitiontype: msdos
    mountpoints:
      - mountpoint: /
        partition: root
      - mountpoint: /boot
        partition: boot
    partitions:
      - name: boot
        fs: ext2
        start: 0%
        end: 50MB
        flags: [ boot ]
      - name: root
        fs: ext4
        start: 50MB
        end: 100%

  - action: filesystem-deploy
    description: Deploying filesystem onto image
